<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        /* Body styling - gradient background */
        body {
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Login box styling */
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Heading */
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        /* Labels */
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        /* Input fields */
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        /* Focus effect */
        input:focus {
            outline: none;
            border-color: #11998e;
        }

        /* Login button */
        button {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Test credentials box */
        .test-creds {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            border-left: 4px solid #ffc107;
        }

        .test-creds strong {
            color: #856404;
        }

        /* Links section */
        .links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .links a {
            color: #11998e;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Remember me checkbox */
        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0 8px 0 0;
        }

        .remember-me label {
            margin: 0;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Login</h2>
        
        <!-- 
            Login form - credentials verify karne ke liye
            action="/login" matlab /login route pe POST request jayegi
        -->
        <form action="/login" method="POST">
            
            <!-- Username field -->
            <label for="username">Username:</label>
            <input 
                type="text" 
                id="username"
                name="username" 
                placeholder="Enter your username" 
                required
                autofocus
            >
            
            <!-- Password field -->
            <label for="password">Password:</label>
            <input 
                type="password" 
                id="password"
                name="password" 
                placeholder="Enter your password" 
                required
            >
            
            <!-- Remember me checkbox -->
            <div class="remember-me">
                <input 
                    type="checkbox" 
                    id="remember" 
                    name="remember"
                >
                <label for="remember">Remember me</label>
            </div>
            
            <!-- Login button -->
            <button type="submit">Login 🔑</button>
        </form>
        
        <!-- Test credentials info -->
        <div class="test-creds">
            <strong>🧪 Test Credentials:</strong><br>
            Username: <code>admin</code><br>
            Password: <code>12345</code>
        </div>
        
        <!-- Links -->
        <div class="links">
            <p>Don't have an account? <a href="/registration.html">Register here</a></p>
            <p><a href="/">← Back to home</a></p>
        </div>
    </div>

    <!-- 
    ============================================
    LOGIN FORM CONCEPTS (HINDI ME):
    ============================================
    
    1. LOGIN FORM KYA HAI:
       - User ko authenticate karne ke liye
       - Username aur password verify hota hai
       - Agar sahi hai to user logged in ho jaata hai
    
    2. SECURITY FEATURES:
       - Password field me text hide rehta hai
       - POST method use karo (GET me password URL me dikehga)
       - Real application me password encrypted hona chahiye
       - HTTPS use karo production me
    
    3. FORM FLOW:
       - User username/password dalega
       - Submit karega
       - Backend me credentials check honge (database se)
       - Agar match kiya to session/token milega
       - Nahi to error message
    
    4. REMEMBER ME CHECKBOX:
       - Agar checked hai to longer session
       - Cookie/token ki expiry time badha sakte ho
       - User dobara login nahi karna padega
    
    5. BEST PRACTICES:
       - Always use POST for login
       - Password field must be type="password"
       - Add CSRF protection (real apps me)
       - Implement rate limiting (brute force attack se bachne ke liye)
       - Use strong password validation
       - Add 2FA for extra security
    
    ============================================
    -->
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        /* Body styling - pura page ka background */
        body {
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Form container - form ko center me box me rakhne ke liye */
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Heading styling */
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        /* Label styling */
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        /* Input aur select fields styling */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        /* Input pe focus karne pe border color change */
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Submit button styling */
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        /* Button hover effect */
        button:hover {
            opacity: 0.9;
        }

        /* Links styling */
        .links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Info box styling */
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>📝 Registration Form</h2>
        
        <div class="info-box">
            💡 <strong>Tip:</strong> Saare fields zaroori hai. Form submit hone ke baad aapka data backend pe jayega!
        </div>
        
        <!-- 
            Form ka action="/submit" matlab jab submit hoga to /submit route pe POST request jayegi
            method="POST" isliye kyuki hum data bhej rahe hai (secure hai GET se)
        -->
        <form action="/submit" method="POST">
            
            <!-- Name field -->
            <label for="username">Full Name:</label>
            <input 
                type="text" 
                id="username"
                name="username" 
                placeholder="Apna naam likho (e.g., Sai Kumar)" 
                required
                minlength="3"
            >
            
            <!-- Email field -->
            <label for="email">Email Address:</label>
            <input 
                type="email" 
                id="email"
                name="email" 
                placeholder="Email address (e.g., sai@example.com)" 
                required
            >
            
            <!-- Password field -->
            <label for="password">Password:</label>
            <input 
                type="password" 
                id="password"
                name="password" 
                placeholder="Strong password (minimum 6 characters)" 
                required
                minlength="6"
            >
            
            <!-- Age field -->
            <label for="age">Age:</label>
            <input 
                type="number" 
                id="age"
                name="age" 
                placeholder="Apni age (18+)" 
                required
                min="18"
                max="100"
            >
            
            <!-- City dropdown -->
            <label for="city">City:</label>
            <select name="city" id="city" required>
                <option value="">-- Select your city --</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Delhi">Delhi</option>
                <option value="Bangalore">Bangalore</option>
                <option value="Hyderabad">Hyderabad</option>
                <option value="Pune">Pune</option>
                <option value="Chennai">Chennai</option>
                <option value="Kolkata">Kolkata</option>
            </select>
            
            <!-- Submit button -->
            <button type="submit">Submit Registration 🚀</button>
        </form>
        
        <!-- Additional links -->
        <div class="links">
            <p>Already have an account? <a href="/login.html">Login here</a></p>
        </div>
    </div>

    <!-- 
    ============================================
    HTML FORM KEY POINTS (HINDI ME):
    ============================================
    
    1. <form> TAG:
       - action="/submit" => Data kis route pe jayega
       - method="POST" => POST request se data jayega (secure)
       - method="GET" => URL me data dikhta hai (less secure)
    
    2. INPUT FIELDS:
       - name="username" => Ye name backend me req.body.username ban jaata hai
       - type="text/email/password/number" => Different input types
       - required => Field fill karna zaroori hai
       - placeholder => Example text dikhata hai
    
    3. FORM SUBMIT KAISE HOTA HAI:
       - User form fill karta hai
       - Submit button click karta hai
       - Browser automatically POST request bhejta hai /submit route pe
       - Backend me req.body me saara data aa jaata hai
    
    4. INPUT TYPES:
       - text => Normal text
       - email => Email validation automatic
       - password => Text hide rehta hai
       - number => Sirf numbers allow
       - date => Date picker
       - file => File upload
       - checkbox => Multiple choices
       - radio => Ek choice
    
    5. VALIDATION:
       - required => Field zaroori hai
       - minlength => Minimum characters
       - maxlength => Maximum characters
       - min/max => Number range
       - pattern => Regex pattern match
    
    ============================================
    -->
</body>
</html>
